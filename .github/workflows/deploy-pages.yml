name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init engine submodule
        run: git -c submodule.recurse=false submodule update --init --depth 1 engine

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build WASM + static site
        working-directory: web
        env:
          VITE_BUILD_SHA: ${{ github.sha }}
          # wasm32 cross-compile — do not use target-cpu=native (native titanium.exe only).
          RUSTFLAGS: ""
          # Single-thread build. The threaded build hard-crashes the worker during
          # thread-pool init on some devices (SharedArrayBuffer/memory limits) — a
          # hard WASM abort can't be caught and auto-recovered reliably. Until that
          # is debugged on-device, ship single-thread (proven stable). Pages can't
          # set COOP/COEP anyway. (COI service worker stays for the future.)
          TITANIUM_WASM_THREADS: "0"
        run: |
          npm ci
          npm run build:pages

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - id: deployment
        uses: actions/deploy-pages@v4
