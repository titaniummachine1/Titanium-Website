<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Play against the Titanium engine — Ishtar or Ka AI"
    />
    <title>Titanium</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <!-- Enable crossOriginIsolated (SharedArrayBuffer / WASM threads) on GitHub
         Pages, which cannot send COOP/COEP headers. Must run before the app so
         the page reloads under the service worker before the engine loads. -->
    <script>
      const isSafariWebKit = () => {
        const userAgent = typeof navigator === 'undefined' ? '' : navigator.userAgent;
        return (
          (/AppleWebKit/i.test(userAgent) &&
            !/Chrome|Chromium|Edg|OPR|Firefox/i.test(userAgent)) ||
          /iPhone|iPad|iPod/i.test(userAgent)
        );
      };
      window.coi = {
        // Safari/WebKit: credentialless unsupported → require-corp from the start
        coepCredentialless: () => !isSafariWebKit(),
        quiet: false,
      };
    </script>
    <script src="%BASE_URL%coi-serviceworker.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
